# docker-compose.yml
version: '3.8'

services:
  frontend:
    build:
      context: ./artifacts/advocacia-hub
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts/advocacia-hub:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:3001/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend_rails
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend_rails:/app
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/advocacia_hub_dev
      - REDIS_URL=redis://redis:6379/0
      - SMTP_ADDRESS=mailcatcher
      - SMTP_PORT=1025
    depends_on:
      - db
      - redis

  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: advocacia_hub_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend_rails/tmp/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data: