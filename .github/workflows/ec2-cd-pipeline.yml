# .github/workflows/ec2-cd-pipeline.yml
name: EC2 Deployment Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_DEFAULT_REGION: us-east-1
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
        ruby-version: [3.0]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: artifacts/advocacia-hub/package-lock.json

    - name: Setup Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
        working-directory: backend_rails

    - name: Install frontend dependencies
      run: |
        cd artifacts/advocacia-hub
        npm ci

    - name: Install backend dependencies
      run: |
        cd backend_rails
        bundle install

    - name: Run frontend tests
      run: |
        cd artifacts/advocacia-hub
        npm run test:unit
        npm run test:integration
        npm run lint
        npm run typecheck

    - name: Run backend tests
      run: |
        cd backend_rails
        bundle exec rspec
      env:
        RAILS_ENV: test

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:javascript"

    - name: Run Secret Scanning
      uses: trufflesecurity/truffleHog@v3
      with:
        path: ./
        extra_args: --only-verified

  build-and-deploy:
    name: Build and Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Build application artifacts
      run: |
        # Build frontend
        cd artifacts/advocacia-hub
        npm run build
        cd ../..
        
        # Prepare backend for deployment
        cd backend_rails
        bundle install --deployment --without development test
        cd ../..

    - name: Deploy to EC2
      run: |
        # Create deployment directory
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} "mkdir -p /home/ubuntu/advocaciahub-deployment"
        
        # Copy application files
        tar -czf deployment.tar.gz artifacts/advocacia-hub/dist backend_rails
        scp -o StrictHostKeyChecking=no deployment.tar.gz ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/home/ubuntu/advocaciahub-deployment/
        rm deployment.tar.gz
        
        # Extract and deploy on EC2
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          cd /home/ubuntu/advocaciahub-deployment
          tar -xzf deployment.tar.gz
          
          # Stop current services
          sudo systemctl stop advocaciahub-backend || true
          sudo systemctl stop nginx || true
          
          # Backup current version
          if [ -d "/opt/advocaciahub" ]; then
            sudo cp -r /opt/advocaciahub /opt/advocaciahub-backup-$(date +%s)
          fi
          
          # Deploy new version
          sudo mkdir -p /opt/advocaciahub
          sudo cp -r artifacts/advocacia-hub/dist/* /var/www/html/ || sudo mkdir -p /var/www/html
          sudo cp -r backend_rails /opt/advocaciahub/backend
          
          # Setup database
          cd /opt/advocaciahub/backend
          bundle install
          RAILS_ENV=production bundle exec rake db:migrate
          
          # Restart services
          sudo systemctl start nginx
          sudo systemctl start advocaciahub-backend
          
          # Cleanup
          rm -rf /home/ubuntu/advocaciahub-deployment
        EOF

    - name: Run post-deployment tests
      run: |
        # Wait for services to start
        sleep 30
        
        # Test if services are responding
        curl -f http://${{ secrets.EC2_PUBLIC_IP }}/ || echo "Frontend not responding"
        curl -f http://${{ secrets.EC2_PUBLIC_IP }}/api/health || echo "Backend not responding"

    - name: Slack Notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    environment: production

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Rollback to previous version
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          # Find the most recent backup
          BACKUP_DIR=$(ls -td /opt/advocaciahub-backup-* 2>/dev/null | head -n1)
          
          if [ -n "$BACKUP_DIR" ]; then
            echo "Rolling back to $BACKUP_DIR"
            
            # Stop services
            sudo systemctl stop advocaciahub-backend
            sudo systemctl stop nginx
            
            # Restore backup
            sudo rm -rf /opt/advocaciahub
            sudo cp -r "$BACKUP_DIR" /opt/advocaciahub
            
            # Restart services
            sudo systemctl start nginx
            sudo systemctl start advocaciahub-backend
            
            echo "Rollback completed"
          else
            echo "No backup found to rollback to"
          fi
        EOF