# Database Configuration
default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['DB_HOST'] || 'localhost' %>
  port: <%= ENV['DB_PORT'] || 5432 %>

development:
  <<: *default
  database: advocacia_hub_development

test:
  <<: *default
  database: advocacia_hub_test

production:
  <<: *default
  database: advocacia_hub_production